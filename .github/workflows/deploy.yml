name: Deploy to Absolute Hosting

on:
  push:
    branches:
      - main  # Deploy when pushing to main branch
  workflow_dispatch:  # Allow manual deployment

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build

      - name: List files to deploy
        run: |
          echo "Files in dist folder:"
          ls -la dist/
          echo ""
          echo "Checking for built assets:"
          find dist/ -type f | head -20

      - name: Verify FTP Secrets
        run: |
          if [ -z "${{ secrets.FTP_SERVER }}" ]; then
            echo "❌ FTP_SERVER secret is missing!"
            exit 1
          fi
          if [ -z "${{ secrets.FTP_USERNAME }}" ]; then
            echo "❌ FTP_USERNAME secret is missing!"
            exit 1
          fi
          if [ -z "${{ secrets.FTP_PASSWORD }}" ]; then
            echo "❌ FTP_PASSWORD secret is missing!"
            exit 1
          fi
          echo "✅ All FTP secrets are configured"
          echo "FTP Server: ${{ secrets.FTP_SERVER }}"
          echo "FTP Username: ${{ secrets.FTP_USERNAME }}"

      - name: Test server connectivity
        run: |
          SERVER="${{ secrets.FTP_SERVER }}"
          # Strip protocol prefix if accidentally included in the secret
          SERVER="${SERVER#ftp://}"
          SERVER="${SERVER#ftps://}"
          SERVER="${SERVER#sftp://}"
          SERVER="${SERVER%%/*}"

          echo "Testing TCP connectivity from GitHub Actions runner to $SERVER..."
          echo ""
          for PORT in 21 990 22; do
            if timeout 15 bash -c "echo > /dev/tcp/$SERVER/$PORT" 2>/dev/null; then
              echo "✅ Port $PORT is reachable"
            else
              echo "❌ Port $PORT is NOT reachable (blocked, closed, or wrong host)"
            fi
          done
          echo ""
          echo "If port 21/990 are closed but 22 is open, your host likely requires SFTP (not supported by FTP-Deploy-Action)."
          echo "If all ports fail, verify FTP_SERVER or ask Absolute Hosting to allow GitHub Actions IP ranges."

      - name: FTPS Deploy (preferred — most hosts require encrypted FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: ${{ secrets.FTP_PORT != '' && secrets.FTP_PORT || '21' }}
          local-dir: ./dist/
          server-dir: ./public_html/
          dangerous-clean-slate: false
          dry-run: false
          log-level: verbose
          security: loose
          timeout: 120000
          state-name: github-actions-state.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
            README.md
            .gitignore
            DEPLOYMENT_TROUBLESHOOTING.md
        continue-on-error: true
        id: ftps-deploy

      - name: FTP Deploy (fallback if FTPS fails)
        if: steps.ftps-deploy.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: ${{ secrets.FTP_PORT != '' && secrets.FTP_PORT || '21' }}
          local-dir: ./dist/
          server-dir: ./public_html/
          dangerous-clean-slate: false
          dry-run: false
          log-level: verbose
          timeout: 120000
          state-name: github-actions-state.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
            README.md
            .gitignore
            DEPLOYMENT_TROUBLESHOOTING.md
        continue-on-error: true
        id: ftp-deploy

      - name: FTPS legacy Deploy (fallback — implicit TLS on port 990)
        if: steps.ftps-deploy.outcome == 'failure' && steps.ftp-deploy.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps-legacy
          port: 990
          local-dir: ./dist/
          server-dir: ./public_html/
          dangerous-clean-slate: false
          dry-run: false
          log-level: verbose
          security: loose
          timeout: 120000
          state-name: github-actions-state.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
            README.md
            .gitignore
            DEPLOYMENT_TROUBLESHOOTING.md


      - name: Verify Deployment
        if: success()
        run: |
          echo "✅ Deployment completed successfully!"
          echo ""
          echo "📋 Files that should be on server:"
          echo "  - index.html (from dist/)"
          echo "  - assets/ (JS, CSS bundles)"
          echo "  - images/ (public assets)"
          echo ""
          echo "🔍 Next steps to verify:"
          echo "1. Check your hosting File Manager (public_html folder)"
          echo "2. Look at file 'Last Modified' timestamps - they should be recent"
          echo "3. Clear browser cache (Ctrl+Shift+R or Cmd+Shift+R)"
          echo "4. Try accessing in Incognito/Private mode"

      - name: Deployment Failed - Troubleshooting
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo ""
          echo "🔍 'Timeout (control socket)' means the runner could not open an FTP connection."
          echo "   This is NOT a wrong-password error — it happens before login."
          echo ""
          echo "Check the 'Test server connectivity' step above:"
          echo "  - Port 21/990 closed → host may block FTP from GitHub Actions IPs"
          echo "  - Port 22 open only → host requires SFTP (FTP-Deploy-Action cannot use SFTP)"
          echo ""
          echo "✅ Fix in FileZilla first:"
          echo "  1. Connect with the same host/user/password as GitHub Secrets"
          echo "  2. Note which protocol works: FTP, FTPS (explicit TLS), or SFTP"
          echo "  3. If SFTP works, you need SSH keys + SamKirkland/web-deploy instead"
          echo ""
          echo "✅ Verify GitHub Secrets:"
          echo "  - FTP_SERVER: hostname only (e.g. ftp.yourdomain.co.za), no ftp:// prefix"
          echo "  - FTP_USERNAME: exact format from FileZilla (username or user@domain)"
          echo "  - FTP_PASSWORD: must match FileZilla exactly (case-sensitive)"
          echo "  - FTP_PORT (optional): only if your host uses a non-standard port"
          echo ""
          echo "If FileZilla works from your PC but GitHub Actions fails, contact Absolute Hosting"
          echo "and ask them to allow FTP/FTPS from GitHub Actions runner IP ranges."

